services:
  backspace:
    build: .
    container_name: backspace
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - backspace-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/backspace.db
      - UPLOAD_DIR=/app/data/uploads
    networks:
      - backspace-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT:-3000}/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backspace-data:
    name: backspace-data
    external: true

networks:
  backspace-net:
    name: backspace-net
    external: true
