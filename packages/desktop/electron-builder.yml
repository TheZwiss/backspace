appId: com.backspace.desktop
productName: Backspace
directories:
  output: dist-electron
files:
  - dist/**/*
  - "!node_modules"
mac:
  category: public.app-category.social-networking
  target:
    - dmg
    - zip
  icon: null
win:
  target:
    - nsis
  icon: null
linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
